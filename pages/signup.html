<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | LibraryHub</title>

<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="stylesheet" href="../css/footer.css">
<link rel="stylesheet" href="../css/signup.css">
</head>

<body>

<div id="navbar-container"></div>

<section class="signup-section">
<div class="signup-card">

<h1>Create Account</h1>
<p class="subtitle">Join LibraryHub and explore books</p>

<form id="signupForm">

<div class="input-group">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter full name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter email" required>
</div>

<div class="input-group">
<label>Password</label>
<div class="password-box">
<input type="password" id="password" placeholder="Create password" required>
<span class="eye" onclick="togglePassword('password')">👁</span>
</div>
<small>Minimum 8 characters</small>
</div>

<div class="input-group">
<label>Confirm Password</label>
<div class="password-box">
<input type="password" id="confirmPassword" placeholder="Confirm password" required>
<span class="eye" onclick="togglePassword('confirmPassword')">👁</span>
</div>
</div>

<button class="signup-btn" type="submit">Create Account</button>

<div class="divider"><span>or</span></div>

<button class="google-btn" type="button" id="googleBtn">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
  Continue with Google
</button>

<p id="message"></p>

</form>

<p class="register-link">
Already have an account? <a href="login.html">Login</a>
</p>

</div>
</section>

<div id="footer-container"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="/api/config"></script>
<script src="../js/theme.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/signup.js"></script>

</body>
</html>
